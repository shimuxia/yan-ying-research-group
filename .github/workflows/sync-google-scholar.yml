# Google Scholar 数据定时同步
# 流程:SerpAPI 拉取作者数据 → 生成 data/*.json → 有变化则 commit 回仓库。
# 依赖 Secrets:SERPAPI_KEY(必须)、GOOGLE_SCHOLAR_ID(可选,缺省 lkDrRmoAAAAJ)。
# API key 只经环境变量传给脚本,不写入任何文件;脚本日志已做脱敏。
name: Sync Google Scholar

on:
  workflow_dispatch:        # 支持在 Actions 页手动运行
  schedule:
    - cron: "0 21 * * 0"    # 每周一 05:00(北京时间)= 周日 21:00 UTC,节省 SerpAPI 免费额度

permissions:
  contents: write           # 允许把更新后的 data/*.json commit 回仓库

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check SERPAPI_KEY configured
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          if [ -z "$SERPAPI_KEY" ]; then
            echo "::error::SERPAPI_KEY secret 未配置,无法同步 Google Scholar 数据。请在仓库 Settings → Secrets and variables → Actions 中添加 SERPAPI_KEY(serpapi.com 注册获取)。"
            exit 1
          fi

      - name: Sync Google Scholar data
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: node scripts/sync-google-scholar.mjs

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/google-scholar-stats.json data/papers.json
          if git diff --cached --quiet; then
            echo "Scholar 数据无变化,跳过 commit。"
          else
            git commit -m "chore: sync google scholar data"
            git push
          fi
